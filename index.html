<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BLOCK BREAKER: FRENZY</title>
    <style>
        /* Compact, Optimized Style */
        /* just a regular comment :) */
        body {
            margin: 0; background: #0088cc; font-family: sans-serif;
            color: white; display: flex; align-items: center; justify-content: center;
            height: 100dvh; text-align: center; overflow: hidden;
        }

        /* Large 'CHEERING' Cloud Container */
        .text-cloud-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; padding: 2rem;
        }

        /* The SVG Text Cloud Shape */
        .svg-cloud {
            width: 100%; height: 100%; filter: drop-shadow(0px 8px 0px rgba(0,0,0,0.2));
            z-index: 11;
        }

        /* Foreground Content (Title + Timer) */
        .content {
            position: relative; z-index: 20; color: #004488;
            max-width: 90%;
        }

        /* Minimal Title Style */
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; text-transform: uppercase; font-weight: 900; }

        /* The Simplified Timer String */
        #timer-text { font-size: 2rem; font-weight: 700; margin-top: 5px; }

        /* Background Cubes and Clouds */
        .element {
            position: fixed; top: 100vh; opacity: 0; z-index: 1;
            font-size: 2rem;
        }

        /* Animation Keyframes (Minified) */
        @keyframes cheer {
            0%{transform: translateY(0); opacity: 0;}
            10%{opacity: .8;}
            90%{opacity: .8;}
            100%{transform: translateY(-110vh) rotate(360deg); opacity: 0;}
        }

        /* CSS Variables to handle different shapes in JS */
        .block { --anim: cheer 15s linear infinite; }
        .cloud { --anim: cheer 20s linear infinite; opacity: 0.6 !important;}

        .element.cheer { animation: var(--anim); }

    </style>
</head>
<body>

    <div class="text-cloud-wrapper">
        <svg class="svg-cloud" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 48A48 48 0 0 1 112 48A48 48 0 0 1 200 48L200 48A48 48 0 0 1 112 48A48 48 0 0 1 16 48Z" fill="white"/>
        </svg>

        <div class="content">
            <h1>FRENZY IN:</h1>
            <div id="timer-text">LOADING...</div>
        </div>
    </div>

    <script>
        // --- 1. MINIFIED TIMER LOGIC (MAY 17, 2:00 PM CDT) ---
        // Compacted logic that handles the absolute target time.
        const target = new Date("May 17, 2026 14:00:00 GMT-0500").getTime();
        const tBox = document.getElementById("timer-text");

        function updateTimer() {
            const now = new Date().getTime();
            const d = target - now;

            if (d < 0) {
                tBox.innerHTML = "SHOWCASE LIVE!"; return;
            }

            // Compact Math: Days, Hrs, Mins, Secs all calculated directly.
            // Using template literals to keep formatting simple.
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hrs = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const secs = Math.floor((d % (1000 * 60)) / 1000).toString().padStart(2, '0');

            tBox.innerHTML = `${days}d ${hrs}h ${mins}m ${secs}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer(); // Initial Call

        // --- 2. CHEERING ELEMENTS (CUBES + CLOUDS) ---
        const elements = ['🟩', '🟦', '🟪', '☁️', '☁️']; // 3 Cubes, 2 Clouds
        const container = document.body;

        function createElement() {
            const el = document.createElement('div');
            // Assign type based on the array content (Cube or Cloud)
            const content = elements[Math.floor(Math.random() * elements.length)];
            el.className = `element ${content === '☁️' ? 'cloud' : 'block'} cheer`;
            el.textContent = content;

            // Random position and timing
            el.style.left = `${Math.random() * 100}vw`;
            el.style.animationDelay = `${Math.random() * 15}s`;
            el.style.fontSize = `${1.5 + Math.random() * 1.5}rem`;

            container.appendChild(el);

            // Clean up to prevent memory bloat
            el.addEventListener('animationend', () => el.remove());
        }

        // Generate dynamic background elements
        for(let i = 0; i < 25; i++) {
            createElement();
        }
        setInterval(createElement, 2000); // Add a new one regularly

    </script>
</body>
</html>
