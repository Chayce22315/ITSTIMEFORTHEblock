<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Block Breaker: Frenzy – Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(175deg,#6ad8fc 0%,#3ab8ee 55%,#2898d0 100%);min-height:100vh;overflow:hidden;font-family:'Nunito',Arial,sans-serif;user-select:none}

/* ── Sky texture (radial highlight) ── */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(255,255,255,.18) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ── Scene layer ── */
#scene{position:fixed;inset:0;pointer-events:none;z-index:1}

/* ── Top title bar ── */
#bar{position:fixed;top:0;left:0;right:0;padding:.75rem 1rem;text-align:center;color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(.85rem,2.5vw,1.55rem);letter-spacing:.14em;text-shadow:0 3px 0 rgba(0,60,130,.4),0 5px 18px rgba(0,30,100,.35);z-index:40;pointer-events:none}

/* ── Cloud wrapper – perfectly centered ── */
#cw{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(580px,90vw);z-index:20}
#cw svg.cloud-svg{display:block;width:100%;height:auto;animation:cpulse 3.5s ease-in-out infinite alternate}

/* ── Text overlay inside cloud ── */
#ct{position:absolute;top:66%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#193878;width:78%;pointer-events:none}
#lbl{font-family:'Fredoka One',cursive;font-size:clamp(.6rem,1.65vw,.95rem);letter-spacing:.45em;margin-bottom:.3em;opacity:.8;text-transform:uppercase}
#tmr{font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,4.2vw,2.45rem);letter-spacing:.04em;line-height:1.05;white-space:nowrap;color:#0f2d72}

/* ── Cube characters ── */
.cube{position:absolute;border-radius:8px;will-change:transform,bottom}
.face{position:absolute;inset:8% 8% 24% 8%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.eyes{display:flex;width:56%;justify-content:space-between}
.eye{width:29%;aspect-ratio:1;background:#1a1a2e;border-radius:50%;border:1px solid rgba(255,255,255,.35);position:relative}
.eye::after{content:'';position:absolute;top:15%;left:22%;width:30%;height:30%;background:rgba(255,255,255,.7);border-radius:50%}
.mouth{width:42%;height:6px;border:2.5px solid #1a1a2e;border-top:none;border-radius:0 0 30px 30px}
.arm{position:absolute;border-radius:6px;width:16%;height:36%;top:18%;background:inherit;filter:brightness(.78)}
.arm.l{left:-18%;transform-origin:top center;animation:armL .58s ease-in-out infinite alternate}
.arm.r{right:-18%;transform-origin:top center;animation:armR .58s ease-in-out infinite alternate}
.leg{position:absolute;border-radius:5px;width:21%;height:30%;bottom:-30%;background:inherit;filter:brightness(.68)}
.leg.l{left:14%;transform-origin:top center;animation:legL .48s ease-in-out infinite alternate}
.leg.r{right:14%;transform-origin:top center;animation:legR .48s ease-in-out infinite alternate}

/* ── Confetti pieces ── */
.conf{position:absolute;top:-30px;will-change:top,transform}

/* ── Food emoji ── */
.food{position:absolute;line-height:1;will-change:bottom}

/* ══ KEYFRAMES ══ */

/* Cloud breathing */
@keyframes cpulse{
  from{filter:drop-shadow(0 10px 28px rgba(0,40,120,.22)) drop-shadow(0 2px 8px rgba(0,0,0,.08))}
  to  {filter:drop-shadow(0 16px 46px rgba(0,40,120,.38)) drop-shadow(0 4px 14px rgba(0,0,0,.12))}
}

/* Float elements up from bottom */
@keyframes floatUp{
  0%  {bottom:-80px;opacity:0}
  7%  {opacity:1}
  88% {opacity:1}
  100%{bottom:115vh;opacity:0}
}

/* Cube dance (alternate bouncing) */
@keyframes dance{
  from{transform:translateY(-15px) rotate(-7deg) scaleX(1.05)}
  to  {transform:translateY( 7px)  rotate( 7deg) scaleX(.96)}
}

/* Limb animations */
@keyframes armL{from{transform:rotate(-42deg)}to{transform:rotate(26deg)}}
@keyframes armR{from{transform:rotate(26deg)} to{transform:rotate(-42deg)}}
@keyframes legL{from{transform:rotate(-24deg)}to{transform:rotate(24deg)}}
@keyframes legR{from{transform:rotate(24deg)} to{transform:rotate(-24deg)}}

/* Confetti falls and spins */
@keyframes confFall{
  from{opacity:.95;transform:rotate(0deg) translateX(0px)}
  to  {top:114vh;opacity:.15;transform:rotate(720deg) translateX(45px)}
}

/* Expired text pulse */
@keyframes livePulse{
  from{transform:translate(-50%,-50%) scale(1)}
  to  {transform:translate(-50%,-50%) scale(1.04)}
}
</style>
</head>
<body>

<div id="bar">🎮 &thinsp;BLOCK BREAKER: FRENZY&thinsp; 🎮</div>
<div id="scene"></div>

<div id="cw">
  <!-- Fluffy cloud: 6 overlapping white ellipses in a 600×275 viewBox -->
  <svg class="cloud-svg" viewBox="0 0 600 275" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g fill="white">
      <!-- Base body -->
      <ellipse cx="300" cy="226" rx="256" ry="56"/>
      <!-- Far-left cap -->
      <ellipse cx="58"  cy="218" rx="72"  ry="58"/>
      <!-- Left shoulder -->
      <ellipse cx="116" cy="183" rx="112" ry="90"/>
      <!-- Centre dome (tallest) -->
      <ellipse cx="294" cy="122" rx="142" ry="108"/>
      <!-- Right shoulder -->
      <ellipse cx="468" cy="168" rx="120" ry="93"/>
      <!-- Far-right cap -->
      <ellipse cx="543" cy="211" rx="74"  ry="61"/>
    </g>
  </svg>

  <!-- Timer text sits at 66% down the cloud (the white belly centre) -->
  <div id="ct">
    <div id="lbl">Frenzy In:</div>
    <div id="tmr">00D &nbsp;00H &nbsp;00M &nbsp;00S</div>
  </div>
</div>

<script>
/* ──────────────────────────────────────────
   TIMER  –  target: 2026-05-17 14:00 CDT
             CDT = UTC-5  →  19:00 UTC
   ────────────────────────────────────────── */
const TARGET = new Date('2026-05-17T19:00:00Z');
const Tmr = document.getElementById('tmr');
const Lbl = document.getElementById('lbl');
const Ct  = document.getElementById('ct');
let expired = false;

function pad(n){ return String(n).padStart(2,'0'); }

function tick(){
  if(expired) return;
  const diff = TARGET - Date.now();
  if(diff <= 0){
    expired = true;
    Lbl.style.display = 'none';
    Tmr.textContent   = '🎮 SHOWCASE LIVE! 🎮';
    Tmr.style.fontSize = 'clamp(.95rem,2.9vw,1.75rem)';
    Ct.style.animation = 'livePulse 1.1s ease-in-out infinite alternate';
    return;
  }
  const d  = Math.floor(diff / 864e5);
  const h  = Math.floor(diff % 864e5 / 36e5);
  const m  = Math.floor(diff % 36e5  / 6e4);
  const s  = Math.floor(diff % 6e4   / 1e3);
  Tmr.textContent = `${pad(d)}D  ${pad(h)}H  ${pad(m)}M  ${pad(s)}S`;
}
setInterval(tick, 1000);
tick();

/* ──────────────────────────────────────────
   SCENE GENERATION
   ────────────────────────────────────────── */
const sc = document.getElementById('scene');
const R  = (a,b) => Math.random()*(b-a)+a;
const PK = arr  => arr[Math.floor(Math.random()*arr.length)];
const $  = tag  => document.createElement(tag);

/* ─── 1. DANCING CUBE CHARACTERS ─── */
// 5 cubes per colour = 15 total
const CUBE_COLS = ['#3ec96e', '#5aadff', '#b96df5'];

CUBE_COLS.forEach(col => {
  for(let i = 0; i < 5; i++){
    const sz  = (R(44,70)|0) + 'px';
    const dur = R(10,20).toFixed(1);
    const del = R(0,20).toFixed(1);
    const dDur= R(.75,1.35).toFixed(2);
    const el  = $('div');
    el.className = 'cube';
    el.style.cssText =
      `left:${R(3,90)}%;bottom:-80px;width:${sz};height:${sz};background:${col};` +
      `animation:floatUp ${dur}s -${del}s linear infinite,` +
               `dance ${dDur}s ease-in-out infinite alternate`;
    el.innerHTML =
      '<div class="face">' +
        '<div class="eyes"><div class="eye"></div><div class="eye"></div></div>' +
        '<div class="mouth"></div>' +
      '</div>' +
      '<div class="arm l"></div><div class="arm r"></div>' +
      '<div class="leg l"></div><div class="leg r"></div>';
    sc.appendChild(el);
  }
});

/* ─── 2. CONFETTI RAIN ─── */
const CC = [
  '#ff5252','#ffeb3b','#69f0ae','#40c4ff',
  '#ff80ab','#ff9800','#ce93d8','#ffffff','#b9f6ca'
];
for(let i = 0; i < 75; i++){
  const el = $('div');
  el.className = 'conf';
  const isCircle = Math.random() > .5;
  const w = R(6,15)|0, h = R(8,22)|0;
  el.style.cssText =
    `left:${R(0,100)}%;` +
    `width:${w}px;height:${h}px;` +
    `background:${PK(CC)};` +
    `border-radius:${isCircle ? '50%' : '2px'};` +
    `animation:confFall ${R(4,9).toFixed(1)}s -${R(0,9).toFixed(1)}s linear infinite`;
  sc.appendChild(el);
}

/* ─── 3. FOOD ITEMS (emoji, float upward) ─── */
const FOOD = ['🍕','🌮','🧁','🥤','🍔','🍦','🍩','🍫','🍟','🌭'];
for(let i = 0; i < 22; i++){
  const el = $('div');
  el.className = 'food';
  el.textContent = PK(FOOD);
  const dur = R(13,25).toFixed(1);
  const del = R(0,25).toFixed(1);
  el.style.cssText =
    `left:${R(2,93)}%;bottom:-65px;` +
    `font-size:${R(1.4,2.6).toFixed(1)}rem;` +
    `animation:floatUp ${dur}s -${del}s linear infinite`;
  sc.appendChild(el);
}
</script>
</body>
</html>
